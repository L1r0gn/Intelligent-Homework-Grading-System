{% extends 'page_base.html' %}
{% load static %}

{% block title %}编辑用户{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i>编辑用户</h5>
                    <a href="{% url 'user_list' %}" class="btn btn-sm btn-light text-primary">
                        <i class="fas fa-arrow-left me-1"></i>返回列表
                    </a>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <!-- 用户名 -->
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label text-end fw-bold">用户名 (登录账号)</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" name="username" value="{{ user.username }}" required>
                                <div class="form-text">用户登录系统的唯一标识。</div>
                            </div>
                        </div>

                        <!-- 昵称 -->
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label text-end fw-bold">姓名 / 昵称</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" name="nickName" value="{{ user.wx_nickName|default:'' }}">
                            </div>
                        </div>

                        <!-- 密码 -->
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label text-end fw-bold">密码</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" name="password" value="" placeholder="若不修改请留空">
                                <div class="form-text text-muted">输入新密码以重置，留空则保持原密码不变。</div>
                            </div>
                        </div>

                        <!-- 手机号 -->
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label text-end fw-bold">手机号</label>
                            <div class="col-sm-9">
                                <input type="text" class="form-control" name="phone" value="{{ user.phone|default:'' }}">
                            </div>
                        </div>

                        <!-- 性别 -->
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label text-end fw-bold">性别</label>
                            <div class="col-sm-9">
                                <select class="form-select" name="gender">
                                    <option value="" {% if not user.gender %}selected{% endif %}>未选择</option>
                                    <option value="1" {% if user.gender == 1 %}selected{% endif %}>男</option>
                                    <option value="2" {% if user.gender == 2 %}selected{% endif %}>女</option>
                                </select>
                            </div>
                        </div>

                        <!-- 用户属性 -->
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label text-end fw-bold">用户属性</label>
                            <div class="col-sm-9">
                                <select class="form-select" name="userAttribute">
                                    <option value=1 {% if user.user_attribute == 1 %}selected{% endif %}>学生</option>
                                    <option value=2 {% if user.user_attribute == 2 %}selected{% endif %}>老师</option>
                                    <option value=3 {% if user.user_attribute == 3 %}selected{% endif %}>管理员</option>
                                    {% if request.user.user_attribute >= 3 %}
                                        <option value=4 {% if user.user_attribute == 4 %}selected{% endif %}>超级管理员</option>
                                    {% endif %}
                                </select>
                            </div>
                        </div>

                        <!-- 所属班级 -->
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label text-end fw-bold">所属班级</label>
                            <div class="col-sm-9">
                                <select class="form-select" name="classInfo">
                                    <option value="">请选择（或留空）</option>
                                    {% for class in class_list %}
                                    <option value="{{ class.id }}" 
                                        {% if class in user.class_in.all %}selected{% endif %}>
                                        {{ class.name}}
                                    </option>
                                    {% endfor %}
                                </select>
                                <div class="form-text">注意：这将设置用户的主班级。</div>
                            </div>
                        </div>

                        <hr class="my-4">
                        
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'user_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times me-1"></i>取消
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>保存更改
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
