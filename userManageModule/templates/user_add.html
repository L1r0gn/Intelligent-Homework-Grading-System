<!DOCTYPE html>
{% extends 'user_base.html' %}
{% load static %}
<html lang="en">
<head>
    <title>{% block title%}添加用户{% endblock %}</title>
</head>
    {% block content %}
    <div class="container">
        <form method="post">
            {% csrf_token %}

            <!-- 昵称：正确 -->
            <div class="form-group">
                <label for="nickName">昵称</label>
                <input type="text" class="form-control" id="nickName" name="nickName" placeholder="请输入昵称">
            </div>

            <!-- 手机号：正确 -->
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" class="form-control" id="phone" name="phone" placeholder="请输入手机号">
            </div>

            <!-- 性别：value改为1/2（与模型choices匹配） -->
            <div class="form-group">
                <label>性别</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" id="male" value="1" checked>
                    <label class="form-check-label" for="male">男</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" id="female" value="2">
                    <label class="form-check-label" for="female">女</label>
                </div>
            </div>

            <!-- 用户属性：value改为1/2（与模型choices匹配） -->
            <div class="form-group">
                <label for="userAttribute">用户属性</label>
                <select class="form-control" id="userAttribute" name="userAttribute">
                    <option value="">请选择用户属性</option>
                    <option value="1">student</option>  <!-- 1对应student -->
                    <option value="2">teacher</option>   <!-- 2对应teacher -->
                </select>
            </div>

            <!-- 班级信息：下拉选择已存在的班级（外键关联必须） -->
            <div class="form-group">
                <label for="classInfo">班级信息</label>
                {% if class_list %}
                    <select class="form-control" id="classInfo" name="classInfo">
                        <option value="">请选择班级</option>
                        {% for class in class_list %}
                            <option value="{{ class.id }}">{{ class.name }}</option>
                        {% endfor %}
                    </select>
                {% else %}
                    <div class="alert alert-warning">
                        暂无可用班级，请先 <a href="{% url 'class_add' %}" class="alert-link">创建班级</a>
                    </div>
                {% endif %}
            </div>

            <div class="d-flex justify-content-end">
                <button type="reset" class="btn btn-secondary mr-2">重置</button>
                <button type="submit" class="btn btn-primary" href="user/list/">提交</button>
            </div>
        </form>
    </div>
    {% endblock %}
