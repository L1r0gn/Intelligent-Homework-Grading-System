{% extends 'question_view_base.html' %}
{% load static %}

{% block title %}创建新问题{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm h-100">
                <div class="card-header">
                    <h4 class="mb-0"><i class="fas fa-plus-circle me-2"></i>创建新问题</h4>
                </div>
                <div class="card-body">
                    <form method="post" action="{% url 'question_create' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="title" class="form-label">题目标题</label>
                            <input type="text" class="form-control" id="title" name="title" placeholder="请输入题目标题" required>
                        </div>
                        <div class="mb-3">
                            <label for="content" class="form-label">题目内容</label>
                            <textarea class="form-control" id="content" name="content" rows="6" placeholder="请详细描述题目..." required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="difficulty" class="form-label">难度等级</label>
                                <select class="form-select" id="difficulty" name="difficulty" required>
                                    <option value="" selected disabled>请选择难度</option>
                                    <option value="1">简单</option>
                                    <option value="2">中等</option>
                                    <option value="3">困难</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="problem_type" class="form-label">题目类型</label>
                                <div class="input-group">
                                    <select class="form-select" id="problem_type" name="problem_type" required>
                                        <option value="" selected disabled>请选择题型</option>
                                        {% for type in problem_types %}
                                        <option value="{{ type.id }}">{{ type.name }}</option>
                                        {% endfor %}
                                    </select>
                                    <button type="button" class="btn btn-outline-secondary js-add-problem-type-btn" data-bs-toggle="modal" data-bs-target="#addProblemTypeModal">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="subject" class="form-label">所属学科</label>
                                <div class="input-group">
                                    <select class="form-select" id="subject" name="subject" required>
                                        <option value="" selected disabled>请选择学科</option>
                                        {% for sub in subjects %}
                                        <option value="{{ sub.id }}">{{ sub.name }}</option>
                                        {% endfor %}
                                    </select>
                                    <button type="button" class="btn btn-outline-secondary js-add-subject-btn" data-bs-toggle="modal" data-bs-target="#addSubjectModal">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="estimated_time" class="form-label">预估时间（分钟）</label>
                                <input type="number" class="form-control" id="estimated_time" name="estimated_time" min="1" value="10">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="answer_content">答案内容</label>
                            <input type="text" class="form-control" id="answer_content" name="answer_content" placeholder="请输入答案（如：A、3.14、x>5等）">
                        </div>
                        <div class="mb-3">
                            <label for="answer_explanation">答案解析</label>
                            <textarea class="form-control" id="answer_explanation" name="answer_explanation" rows="3" placeholder="请输入解题步骤或答案解析（可选）"></textarea>
                        </div>

                        <div class="d-flex justify-content-end mt-4">
                            <a href="{% url 'question_list' %}" class="btn btn-secondary me-2">返回列表</a>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>保存题目</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            </div>
    </div>
</div>

<div class="modal fade" id="addSubjectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">添加新科目</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="addSubjectForm">
                    <label for="new_subject_name" class="form-label">科目名称</label>
                    <input type="text" class="form-control" id="new_subject_name" required>
                    <div id="subject-error" class="text-danger mt-2"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" id="saveSubjectBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addProblemTypeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">添加新题型</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="addProblemTypeForm">
                    <label for="new_problem_type_name" class="form-label">题型名称</label>
                    <input type="text" class="form-control" id="new_problem_type_name" required>
                    <div id="problem-type-error" class="text-danger mt-2"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" id="saveProblemTypeBtn">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block custom_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Reusable script for AJAX creation
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    let activeSelectElement = null; // To store the dropdown that triggered the modal

    // --- Subject adding logic ---
    const addSubjectModalEl = document.getElementById('addSubjectModal');
    const addSubjectModal = new bootstrap.Modal(addSubjectModalEl);
    document.addEventListener('click', function(e) {
        if (e.target.closest('.js-add-subject-btn')) {
            // Find the select element within the same input-group
            activeSelectElement = e.target.closest('.input-group').querySelector('select');
        }
    });
    document.getElementById('saveSubjectBtn').addEventListener('click', function() {
        handleAjaxCreate({
            nameInputId: 'new_subject_name',
            errorDivId: 'subject-error',
            url: "{% url 'ajax_create_subject' %}",
            modalInstance: addSubjectModal,
            selectsQuery: 'select[name="subject"]' // Target the subject select
        });
    });

    // --- Problem Type adding logic ---
    const addProblemTypeModalEl = document.getElementById('addProblemTypeModal');
    const addProblemTypeModal = new bootstrap.Modal(addProblemTypeModalEl);
    document.addEventListener('click', function(e) {
        if (e.target.closest('.js-add-problem-type-btn')) {
            activeSelectElement = e.target.closest('.input-group').querySelector('select');
        }
    });
    document.getElementById('saveProblemTypeBtn').addEventListener('click', function() {
        handleAjaxCreate({
            nameInputId: 'new_problem_type_name',
            errorDivId: 'problem-type-error',
            url: "{% url 'ajax_create_problem_type' %}",
            modalInstance: addProblemTypeModal,
            selectsQuery: 'select[name="problem_type"]' // Target the problem_type select
        });
    });

    // --- Generic AJAX creation function ---
    function handleAjaxCreate(config) {
        const nameInput = document.getElementById(config.nameInputId);
        const errorDiv = document.getElementById(config.errorDivId);
        const name = nameInput.value.trim();
        errorDiv.textContent = '';

        if (!name) {
            errorDiv.textContent = '名称不能为空。';
            return;
        }

        fetch(config.url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrfToken},
            body: JSON.stringify({ name: name })
        })
        .then(response => response.json())
        .then(data => {
            if (data.id) {
                const newOption = new Option(data.name, data.id, false, true); // new Option(text, value, defaultSelected, selected)
                // Update all relevant dropdowns on the page
                document.querySelectorAll(config.selectsQuery).forEach(select => {
                    select.add(newOption.cloneNode(true));
                });
                // Auto-select the new option in the dropdown that opened the modal
                if (activeSelectElement) {
                    activeSelectElement.value = data.id;
                }
                nameInput.value = '';
                config.modalInstance.hide();
            } else {
                errorDiv.textContent = data.error || '发生未知错误。';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            errorDiv.textContent = '网络请求失败，请检查后台服务。';
        });
    }

    // --- Cleanup modal state on hide ---
    [addSubjectModalEl, addProblemTypeModalEl].forEach(modalEl => {
        modalEl.addEventListener('hidden.bs.modal', function () {
            this.querySelector('input').value = '';
            this.querySelector('.text-danger').textContent = '';
            activeSelectElement = null; // Reset the active select element
        });
    });

    // Existing function for reusing question content
    function useExistingQuestion(title, content) {
        // ... (this function remains unchanged)
    }
});
</script>
{% endblock %}
