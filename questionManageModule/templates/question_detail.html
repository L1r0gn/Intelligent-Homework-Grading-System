<!DOCTYPE html>
{% extends "question_view_base.html" %}
{% load static %}

{% block title %}问题详情 - {{ question.title }}{% endblock %}

{% block content %}
<div class="container">
    <h2>{{ question.title }}</h2>
    <div class="well">
        <p>{{ question.content }}</p>
    </div>
    <div>
        <a href="{% url 'question_list' %}" class="btn btn-default">返回列表</a>
        <a href="{% url 'question_update' question.id %}" class="btn btn-primary">编辑</a>
    </div>
</div>
{% endblock %}
