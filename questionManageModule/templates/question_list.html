
<!DOCTYPE html>
{% extends "question_view_base.html" %}
{% load static %}

{% block title %}问题列表{% endblock %}

{% block content %}
<div class="container mt-4">
    <!-- 页面标题和操作按钮区域 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>问题列表</h2>
        <a href="{% url 'question_create' %}" class="btn btn-primary">
            创建新问题
        </a>
    </div>

    <!-- 问题列表表格 -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-striped mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for question in questions %}
                    <tr>
                        <td>{{ question.id }}</td>
                        <td>
                            <a href="{% url 'question_detail' question.id %}" class="text-decoration-none">
                                {{ question.title|truncatechars:30 }}
                            </a>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a href="{% url 'question_detail' question.id %}" class="btn btn-info">查看</a>
                                <a href="{% url 'question_update' question.id %}" class="btn btn-warning">编辑</a>
                                <a href="{% url 'question_delete' question.id %}" class="btn btn-danger"
                                   onclick="return confirm('确定要删除这个问题吗？')">
                                    删除
                                </a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center py-4">
                            <div class="text-muted">暂无问题数据</div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
