<!DOCTYPE html>
{% extends "question_view_base.html" %}
{% load static %}

{% block title %}问题列表{% endblock %}

{% block content %}
<div class="container">
    <h2>问题列表</h2>
    <a href="{% url 'question_create' %}" class="btn btn-primary">创建新问题</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>标题</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for question in questions %}
            <tr>
                <td>{{ question.id }}</td>
                <td>{{ question.title }}</td>
                <td>
                    <a href="{% url 'question_detail' question.id %}" class="btn btn-info btn-sm">查看</a>
                    <a href="{% url 'question_update' question.id %}" class="btn btn-warning btn-sm">编辑</a>
                    <a href="{% url 'question_delete' question.id %}" class="btn btn-danger btn-sm">删除</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
