{% block content %}

                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">

                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="fas fa-lightbulb me-2"></i>学习建议</h5>
                </div>
                <div class="card-body">

    <!-- 主要分析面板 -->

            <div class="card shadow-sm mb-4">

                    <h5 class="mb-0"><i class="fas fa-brain me-2"></i>知识掌握概览</h5>
                    <div>

                            <i class="fas fa-sync-alt me-1"></i>刷新

                </div>
                <div class="card-body">
                    <!-- 掌握度雷达图容器 -->
                    <div id="masteryRadarChart" style="height: 400px;"></div>
                </div>
            </div>

            <!-- 知识点详细列表 -->
            <div class="card shadow-sm">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0"><i class="fas fa-list me-2"></i>知识点详细分析</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover" id="knowledgePointTable">
                            <thead class="table-light">
                                <tr>
                                    <th>知识点</th>
                                    <th>科目</th>
                                    <th>掌握概率</th>
                                    <th>答题次数</th>
                                    <th>正确率</th>
                                    <th>预测表现</th>

                            </thead>

                                <!-- 动态填充数据 -->

                    </div>

        </div>

        <!-- 右侧面板：学习轨迹和统计 -->
        <div class="col-lg-4">
            <!-- 学习趋势图 -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="fas fa-chart-line me-2"></i>学习趋势</h5>
                </div>
                <div class="card-body">
                    <div id="learningTrendChart" style="height: 250px;"></div>
                </div>
            </div>

            <!-- 统计摘要 -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="fas fa-chart-pie me-2"></i>统计摘要</h5>
                </div>

                                <small class="text-muted">知识点总数</small>
                            </div>
                        </div>
                        <div class="col-6 mb-3">
                            <div class="bg-light p-3 rounded">
                                <h3 class="text-success mb-1" id="averageMastery">0%</h3>

                        <div class="col-6">
                            <div class="bg-light p-3 rounded">
                                <h3 class="text-warning mb-1" id="masteredCount">0</h3>
                                <small class="text-muted">熟练掌握</small>
                            </div>

                        <div class="col-6">
                            <div class="bg-light p-3 rounded">

                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="fas fa-history me-2"></i>最近学习活动</h5>
                </div>
                <div class="card-body">
                    <div id="recentActivities">
                        <p class="text-muted">暂无学习活动记录</p>

                </div>

<!-- ECharts JS库 -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<!-- CSRF Token 获取 -->
<script>
// 获取CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie('csrftoken');

// 带CSRF token的fetch函数
async function fetchWithCSRF(url, options = {}) {
    options.headers = {
        'X-CSRFToken': csrftoken,
        'Content-Type': 'application/json',
        ...options.headers
    };
    
    return fetch(url, options);
}
</script>

<script>
// 全局变量
let currentStudentId = null;
let masteryChart = null;
let trendChart = null;

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    initializeCharts();
    loadStudentList();
    bindEvents();
});

// 初始化图表
function initializeCharts() {
    // 掌握度雷达图
    const masteryChartDom = document.getElementById('masteryRadarChart');
    masteryChart = echarts.init(masteryChartDom);
    
    // 学习趋势图
    const trendChartDom = document.getElementById('learningTrendChart');
    trendChart = echarts.init(trendChartDom);
    
    // 设置初始空状态
    masteryChart.clear();
    trendChart.clear();
    masteryChart.setOption(getEmptyRadarOption());
    trendChart.setOption(getEmptyLineOption());
}

// 获取空雷达图配置
function getEmptyRadarOption() {
    return {
        title: {
            text: '请选择学生查看知识掌握情况',
            left: 'center',
            top: 'center',
            textStyle: {
                color: '#666',
                fontSize: 16
            }
        }
    };
}

// 获取空折线图配置
function getEmptyLineOption() {
    return {
        title: {
            text: '暂无数据',
            left: 'center',
            top: 'center',
            textStyle: {
                color: '#666',
                fontSize: 14
            }
        }
    };
}

// 加载学生列表
async function loadStudentList() {
    try {
        // 使用用户管理模块的API来获取学生列表
        const response = await fetchWithCSRF('/user/api/student/search/?q=');
        const data = await response.json();
        
        const select = document.getElementById('studentSelect');
        select.innerHTML = '<option value="">请选择学生...</option>';
        
        data.results.forEach(student => {
            const option = document.createElement('option');
            option.value = student.id;
            option.textContent = student.text;
            select.appendChild(option);
        });
    } catch (error) {
        console.error('加载学生列表失败:', error);
        showMessage('加载学生列表失败', 'error');
    }
}

// 绑定事件监听器
function bindEvents() {
    // 学生选择变化
    document.getElementById('studentSelect').addEventListener('change', function() {
        const studentId = this.value;
        if (studentId) {
            currentStudentId = studentId;
            loadStudentProfile(studentId);
        } else {
            resetCharts();
        }
    });
    
    // 班级筛选
    document.getElementById('classSelect').addEventListener('click', function() {
        filterStudentsByClass(this.value);
    });
    
    // 刷新按钮
    document.getElementById('refreshBtn').addEventListener('click', function() {
        if (currentStudentId) {
            loadStudentProfile(currentStudentId);
        }
    });
    
    // 导出按钮
    document.getElementById('exportBtn').addEventListener('click', function() {
        exportStudentReport();
    });
}

// 加载学生档案
async function loadStudentProfile(studentId) {
    initializeCharts();
    try {
        console.log('开始加载学生档案:', studentId);
        // 使用BKT模块的API端点，这个端点需要认证
        const response = await fetchWithCSRF(`/bkt/student/${studentId}/profile/`);
        const data = await response.json();
        console.log('收到学生数据:', data);
        
        if (response.ok && data.success) {
            showMessage('加载学生档案成功');
            console.log('准备更新显示，数据:', data.data);
            initializeCharts();
            updateProfileDisplay(data.data);
            updateCharts(data.data);
            updateSuggestions(data.data);
            updateRecentActivities(studentId);
        } else {
            // 检查是否有错误信息
            const errorMsg = data.error || '加载学生数据失败';
            showMessage(errorMsg, 'error');
            console.error('API错误:', errorMsg);
        }
    } catch (error) {
        console.error('加载学生档案失败:', error);
        showMessage('加载学生档案失败: ' + error.message, 'error');
    }
}

// 更新档案显示
function updateProfileDisplay(profile) {
    // 更新统计摘要
    document.getElementById('totalKnowledgePoints').textContent = profile.total_knowledge_points;
    document.getElementById('averageMastery').textContent = Math.round(profile.summary.average_mastery * 100) + '%';
    document.getElementById('masteredCount').textContent = profile.summary.mastered_count;
    document.getElementById('strugglingCount').textContent = profile.summary.struggling_count;
    
    // 更新知识点表格
    updateKnowledgePointTable(profile.knowledge_points);
}

// 更新知识点表格
function updateKnowledgePointTable(knowledgePoints) {
    const tbody = document.querySelector('#knowledgePointTable tbody');
    tbody.innerHTML = '';
    
    knowledgePoints.forEach(kp => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${kp.name}</td>
            <td><span class="badge bg-secondary">${kp.subject}</span></td>
            <td>
                <div class="progress" style="height: 20px;">
                    <div class="progress-bar ${getMasteryBarClass(kp.mastery_probability)}" 
                         style="width: ${kp.mastery_probability * 100}%;">
                        ${(kp.mastery_probability * 100).toFixed(1)}%
                    </div>
                </div>
            </td>
            <td>${kp.total_attempts}</td>
            <td>${kp.total_attempts > 0 ? Math.round((kp.correct_attempts / kp.total_attempts) * 100) + '%' : '0%'}</td>
            <td>${(kp.predicted_performance * 100).toFixed(1)}%</td>
            <td><span class="badge ${getStatusBadgeClass(kp.level)}">${getStatusText(kp.level)}</span></td>
        `;
        tbody.appendChild(row);
    });
}

// 获取掌握度进度条样式类
function getMasteryBarClass(probability) {
    const prob = probability || 0;
    if (prob >= 0.8) return 'bg-success';
    if (prob >= 0.5) return 'bg-warning';
    return 'bg-danger';
}

// 获取状态徽章样式类
function getStatusBadgeClass(level) {
    switch(level) {
        case 'mastered': return 'bg-success';
        case 'learning': return 'bg-warning';
        case 'struggling': return 'bg-danger';
        default: return 'bg-secondary';
    }
}

// 获取状态文本
function getStatusText(level) {
    switch(level) {
        case 'mastered': return '熟练掌握';
        case 'learning': return '学习中';
        case 'struggling': return '需要加强';
        default: return '未知';
    }
}

// 更新图表
function updateCharts(profile) {
    console.log('开始更新图表，接收到的数据:', profile);
    updateRadarChart(profile);
    updateTrendChart(profile);
    console.log('图表更新完成');
}

// 更新雷达图
function updateRadarChart(profile) {
    // 安全检查：确保profile和knowledge_points存在
    if (!profile || !profile.knowledge_points || !Array.isArray(profile.knowledge_points)) {
        console.warn('雷达图数据不完整:', profile);
        masteryChart.setOption(getEmptyRadarOption());
        return;
    }
    
    // 检查是否有有效的知识点数据
    const validKnowledgePoints = profile.knowledge_points.filter(kp => 
        kp && typeof kp.mastery_probability === 'number' && 
        typeof kp.name === 'string' && kp.name.trim() !== ''
    );
    
    if (validKnowledgePoints.length === 0) {
        console.log('没有有效的知识点数据');
        masteryChart.setOption(getEmptyRadarOption());
        return;
    }
    
    const indicators = [];
    const data = [];
    
    // 使用过滤后的有效数据
    validKnowledgePoints.forEach(kp => {
        indicators.push({ 
            name: kp.name.trim(), 
            max: 1 
        });
        data.push(Math.max(0, Math.min(1, kp.mastery_probability || 0)));
    });
    
    // 确保至少有3个指标点才能正常显示雷达图
    if (indicators.length < 3) {
        // 添加虚拟数据点确保图表能正常显示
        const neededPoints = 3 - indicators.length;
        for (let i = 0; i < neededPoints; i++) {
            indicators.push({ name: `知识点${indicators.length + 1}`, max: 1 });
            data.push(0);
        }
        console.warn('添加虚拟数据点以使雷达图正常显示');
    }
    
    const option = {
        tooltip: {
            trigger: 'item',
            formatter: function(params) {
                const index = params.dataIndex;
                if (index < validKnowledgePoints.length) {
                    const kp = validKnowledgePoints[index];
                    const name = kp.name || '未知知识点';
                    const mastery = typeof kp.mastery_probability === 'number' ? 
                        (kp.mastery_probability * 100).toFixed(1) : '0.0';
                    const attempts = kp.total_attempts || 0;
                    return `${name}<br/>掌握概率: ${mastery}%<br/>答题次数: ${attempts}`;
                }
                return '';
            }
        },
        radar: {
            indicator: indicators,
            radius: '60%',
            splitNumber: 5
        },
        series: [{
            type: 'radar',
            data: [{
                value: data,
                name: '掌握度',
                areaStyle: {
                    opacity: 0.3
                },
                lineStyle: {
                    width: 2
                }
            }]
        }],
        color: ['#3b82f6']
    };
    masteryChart.clear();
    masteryChart.setOption(option);
}

// 更新趋势图
function updateTrendChart(profile) {
    // 简化的趋势图，显示各类知识点的数量分布
    const mastered = profile.summary.mastered_count;
    const learning = profile.summary.learning_count;
    const struggling = profile.summary.struggling_count;
    
    const option = {
        tooltip: {
            trigger: 'axis'
        },
        xAxis: {
            type: 'category',
            data: ['熟练掌握', '学习中', '需要加强']
        },
        yAxis: {
            type: 'value'
        },
        series: [{
            data: [mastered, learning, struggling],
            type: 'bar',
            itemStyle: {
                color: function(params) {
                    const colors = ['#10b981', '#f59e0b', '#ef4444'];
                    return colors[params.dataIndex];
                }
            }
        }]
    };
    trendChart.clear();
    trendChart.setOption(option);
}

// 更新学习建议
function updateSuggestions(profile) {
    const container = document.getElementById('learningSuggestions');
    
    const suggestions = [];
    
    // 识别薄弱知识点
    const weakPoints = profile.knowledge_points
        .filter(kp => kp.mastery_probability < 0.5)
        .sort((a, b) => a.mastery_probability - b.mastery_probability)
        .slice(0, 3);
    
    if (weakPoints.length > 0) {
        suggestions.push({
            type: 'warning',
            title: '重点加强',
            message: `建议重点复习以下${weakPoints.length}个知识点：${weakPoints.map(kp => kp.name).join('、')}`
        });
    }
    
    // 识别掌握良好的知识点
    const strongPoints = profile.knowledge_points
        .filter(kp => kp.mastery_probability > 0.8)
        .slice(0, 2);
    
    if (strongPoints.length > 0) {
        suggestions.push({
            type: 'success',
            title: '巩固提升',
            message: `在${strongPoints.map(kp => kp.name).join('、')}方面表现优秀，可以挑战更高难度的题目`
        });
    }
    
    // 平均掌握度建议
    const avgMastery = profile.summary.average_mastery;
    if (avgMastery < 0.6) {
        suggestions.push({
            type: 'info',
            title: '学习建议',
            message: '整体掌握度有待提升，建议制定系统性的复习计划'
        });
    } else if (avgMastery > 0.8) {
        suggestions.push({
            type: 'success',
            title: '学习成果',
            message: '学习效果良好，继续保持！'
        });
    }
    
    // 渲染建议
    if (suggestions.length === 0) {
        container.innerHTML = '<p class="text-muted">暂无个性化建议</p>';
    } else {
        container.innerHTML = suggestions.map(sug => `
            <div class="alert alert-${sug.type} mb-2">
                <h6 class="alert-heading"><i class="fas fa-${getAlertIcon(sug.type)} me-1"></i>${sug.title}</h6>
                <p class="mb-0">${sug.message}</p>
            </div>
        `).join('');
    }
}

// 获取提醒图标
function getAlertIcon(type) {
    switch(type) {
        case 'success': return 'check-circle';
        case 'warning': return 'exclamation-triangle';
        case 'info': return 'info-circle';
        case 'danger': return 'times-circle';
        default: return 'info-circle';
    }
}

// 更新最近活动
async function updateRecentActivities(studentId) {
    try {
        // 这里可以调用获取学习轨迹的API
        const container = document.getElementById('recentActivities');
        container.innerHTML = '<p class="text-muted">最近学习活动功能正在开发中...</p>';
    } catch (error) {
        console.error('加载最近活动失败:', error);
    }
}

// 重置图表到空状态
function resetCharts() {
    masteryChart.setOption(getEmptyRadarOption());
    trendChart.setOption(getEmptyLineOption());
    
    // 重置统计数据
    document.getElementById('totalKnowledgePoints').textContent = '0';
    document.getElementById('averageMastery').textContent = '0%';
    document.getElementById('masteredCount').textContent = '0';
    document.getElementById('strugglingCount').textContent = '0';
    
    // 清空表格
    document.querySelector('#knowledgePointTable tbody').innerHTML = '';
    
    // 清空建议
    document.getElementById('learningSuggestions').innerHTML = '<p class="text-muted">请选择学生查看个性化学习建议</p>';
}

// 导出学生报告
function exportStudentReport() {
    if (!currentStudentId) {
        showMessage('请先选择学生', 'warning');
        return;
    }
    
    showMessage('报告导出功能正在开发中...', 'info');
}

// 按班级筛选学生
function filterStudentsByClass(classId) {
    // 这个功能需要后端API支持
    showMessage('班级筛选功能正在开发中...暂不可用', 'info');
}

// 显示消息提示（支持多条同时显示）
function showMessage(message, type = 'info') {
    // 创建消息容器
    const alertDiv = document.createElement('div');
    alertDiv.className = `custom-alert custom-alert-${type}`;

    // 类型对应的图标和颜色
    const typeConfig = {
        'success': { icon: '✓', bgColor: '#10b981', iconBg: '#059669' },
        'error': { icon: '✕', bgColor: '#ef4444', iconBg: '#dc2626' },
        'warning': { icon: '!', bgColor: '#f59e0b', iconBg: '#d97706' },
        'info': { icon: 'i', bgColor: '#3b82f6', iconBg: '#2563eb' }
    };

    const config = typeConfig[type] || typeConfig.info;

    // 计算新消息的垂直位置
    const existingAlerts = document.querySelectorAll('.custom-alert');
    const baseTop = 24; // 基础顶部距离
    const alertSpacing = 100; // 每个消息之间的间距
    const alertHeight = 80; // 每个消息的估算高度

    // 如果已有消息，计算新的顶部位置
    let topPosition = baseTop;
    if (existingAlerts.length > 0) {
        topPosition = baseTop + (existingAlerts.length * alertSpacing);
    }

    // 设置样式
    alertDiv.style.cssText = `
        position: fixed;
        top: ${topPosition}px;
        right: 24px;
        z-index: ${9999 - existingAlerts.length}; // 越新的消息层级越高
        min-width: 320px;
        max-width: 400px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1), 0 5px 10px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        animation: slideInRight 0.3s ease-out;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition: top 0.3s ease; /* 添加平滑移动效果 */
    `;

    // 内容HTML（保持不变）
    alertDiv.innerHTML = `
        <div style="
            display: flex;
            align-items: flex-start;
            padding: 16px;
            gap: 12px;
        ">
            <div style="
                flex-shrink: 0;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: ${config.iconBg};
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                font-size: 14px;
            ">${config.icon}</div>

            <div style="flex: 1; min-width: 0;">
                <div style="
                    font-weight: 600;
                    color: #1f2937;
                    margin-bottom: 4px;
                    font-size: 15px;
                ">${type.charAt(0).toUpperCase() + type.slice(1)}</div>
                <div style="
                    color: #6b7280;
                    font-size: 14px;
                    line-height: 1.5;
                ">${message}</div>
            </div>

            <button type="button" class="alert-close" style="
                flex-shrink: 0;
                background: none;
                border: none;
                color: #9ca3af;
                font-size: 18px;
                cursor: pointer;
                padding: 0;
                width: 24px;
                height: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
                transition: all 0.2s;
            ">&times;</button>
        </div>

        <div class="progress-bar" style="
            height: 3px;
            background: ${config.bgColor};
            width: 100%;
            animation: progress 3s linear;
        "></div>
    `;

    // 添加到页面
    document.body.appendChild(alertDiv);

    // 添加CSS动画（保持不变）
    if (!document.querySelector('#alert-styles')) {
        const style = document.createElement('style');
        style.id = 'alert-styles';
        style.textContent = `
            @keyframes slideInRight {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            @keyframes progress {
                from { width: 100%; }
                to { width: 0%; }
            }

            @keyframes fadeOutUp {
                from { opacity: 1; transform: translateY(0) scale(1); }
                to { opacity: 0; transform: translateY(-20px) scale(0.95); }
            }

            .custom-alert {
                transition: all 0.3s ease;
            }

            .alert-close:hover {
                background: #f3f4f6 !important;
                color: #374151 !important;
            }
        `;
        document.head.appendChild(style);
    }

    // 关闭按钮事件 - 更新：移除后重新排列其他消息
    alertDiv.querySelector('.alert-close').addEventListener('click', () => {
        removeAlert(alertDiv);
    });

    // 3秒后自动消失 - 更新：调用移除函数
    setTimeout(() => {
        removeAlert(alertDiv);
    }, 3000);
}

// 移除消息并重新排列剩余消息的函数
function removeAlert(alertToRemove) {
    // 添加移除动画
    alertToRemove.style.animation = 'fadeOutUp 0.3s ease-out';

    setTimeout(() => {
        if (alertToRemove.parentNode) {
            // 移除消息
            alertToRemove.parentNode.removeChild(alertToRemove);

            // 重新排列剩余消息
            const remainingAlerts = document.querySelectorAll('.custom-alert');
            remainingAlerts.forEach((alert, index) => {
                const baseTop = 24;
                const alertSpacing = 80;
                const newTop = baseTop + (index * alertSpacing);
                alert.style.top = `${newTop}px`;
                alert.style.zIndex = `${9999 - index}`;
            });
        }
    }, 300);
}

// 窗口大小改变时重绘图表 - 添加防抖优化
let resizeTimeout;
window.addEventListener('resize', function() {
    // 清除之前的定时器
    clearTimeout(resizeTimeout);

    // 设置新的定时器，延迟200ms执行
    resizeTimeout = setTimeout(() => {
        // 添加一个简单的缩放提示
        const scaleTip = document.querySelector('.resize-tip');
        if (!scaleTip) {
            const tip = document.createElement('div');
            tip.className = 'resize-tip';
            tip.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #3b82f6;
                color: white;
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 12px;
                opacity: 0;
                transform: translateY(10px);
                transition: all 0.3s ease;
                z-index: 10000;
                box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            `;
            tip.textContent = '图表重绘中...';
            document.body.appendChild(tip);

            // 显示提示
            setTimeout(() => {
                tip.style.opacity = '1';
                tip.style.transform = 'translateY(0)';
            }, 10);

            // 1.5秒后淡出
            setTimeout(() => {
                tip.style.opacity = '0';
                tip.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    if (tip.parentNode) tip.parentNode.removeChild(tip);
                }, 300);
            }, 1500);
        }

        // 重绘图表
        if (masteryChart) {
            masteryChart.resize();
            masteryChart.setOption(masteryChart.getOption()); // 确保重新渲染
        }
        if (trendChart) {
            trendChart.resize();
            trendChart.setOption(trendChart.getOption());
        }

    }, 200); // 延迟200ms，避免频繁重绘
});

// 窗口大小改变时重绘图表
window.addEventListener('resize', function() {
    if (masteryChart) masteryChart.resize();
    if (trendChart) trendChart.resize();
});
</script>
